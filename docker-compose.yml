version: "3.8"

# Local observability stack for LLM agent monitoring.
# Run: docker compose -f llm-observability/docker-compose.yml up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: llm-obs-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: llm-obs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./config/redis-acl.conf:/etc/redis/users.acl:ro
    command: >
      redis-server
      --appendonly yes
      --aclfile /etc/redis/users.acl
      --maxmemory 256mb
      --maxmemory-policy noeviction
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
